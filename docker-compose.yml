services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./stormwater_app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - projects_data:/app/projects
      - output_data:/app/output
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  projects_data:
  output_data:
